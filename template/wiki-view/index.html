<!DOCTYPE html>
<html lang="en" data-theme="dark" data-labels="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{WORKSPACE}} — wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/main.css">
</head>
<body>
  <aside id="sidebar">
    <header class="sidebar-head">
      <button id="sidebar-toggle" class="icon-btn" title="Collapse sidebar" aria-label="Collapse sidebar">
        <svg viewBox="0 0 16 16" width="14" height="14"><path d="M10 4 L6 8 L10 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="workspace-name">{{WORKSPACE}}</span>
    </header>
    <div class="sidebar-search-wrap">
      <input id="sidebar-search" type="search" placeholder="Search pages…" autocomplete="off" spellcheck="false">
    </div>
    <div id="sidebar-list" class="sidebar-list" role="listbox"></div>
    <footer class="sidebar-foot">
      <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
        <svg id="theme-icon-sun" viewBox="0 0 16 16" width="14" height="14"><circle cx="8" cy="8" r="3" fill="currentColor"/><g stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="8" y1="1.5" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="14.5"/><line x1="1.5" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="14.5" y2="8"/><line x1="3.4" y1="3.4" x2="4.5" y2="4.5"/><line x1="11.5" y1="11.5" x2="12.6" y2="12.6"/><line x1="3.4" y1="12.6" x2="4.5" y2="11.5"/><line x1="11.5" y1="4.5" x2="12.6" y2="3.4"/></g></svg>
        <svg id="theme-icon-moon" viewBox="0 0 16 16" width="14" height="14"><path d="M12.5 9.5 a 5 5 0 1 1 -6 -6 a 4 4 0 0 0 6 6 z" fill="currentColor"/></svg>
      </button>
      <span class="meta-counts" id="meta-counts"></span>
    </footer>
  </aside>

  <main id="graph-pane">
    <div id="graph"></div>
    <div class="graph-controls">
      <button id="label-mode" class="ctrl-btn" title="Label visibility" aria-label="Label visibility">
        <span class="ctrl-label">labels:</span><span id="label-mode-state">auto</span>
      </button>
    </div>
    <button id="settings-trigger" class="icon-btn settings-trigger" title="Physics settings" aria-label="Physics settings">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="2.4"/>
        <path d="M8 1.5 L8 3.2 M8 12.8 L8 14.5 M1.5 8 L3.2 8 M12.8 8 L14.5 8 M3.4 3.4 L4.6 4.6 M11.4 11.4 L12.6 12.6 M3.4 12.6 L4.6 11.4 M11.4 4.6 L12.6 3.4"/>
      </svg>
    </button>
    <div id="settings-panel" class="settings-panel hidden" role="dialog" aria-label="Physics settings">
      <div class="settings-head">Physics</div>
      <div class="settings-row">
        <label for="phys-charge">Repulsion</label>
        <input id="phys-charge" type="range" min="-1200" max="-50" step="10" value="-420">
        <span id="phys-charge-val" class="settings-val">-420</span>
      </div>
      <div class="settings-row">
        <label for="phys-link">Link distance</label>
        <input id="phys-link" type="range" min="20" max="300" step="5" value="110">
        <span id="phys-link-val" class="settings-val">110</span>
      </div>
      <div class="settings-row">
        <label for="phys-collide">Collide pad</label>
        <input id="phys-collide" type="range" min="0" max="40" step="1" value="10">
        <span id="phys-collide-val" class="settings-val">10</span>
      </div>
      <button id="phys-reset" class="settings-reset">Reset</button>
    </div>
  </main>

  <div id="modal-backdrop" class="hidden" aria-hidden="true"></div>
  <div id="modal" class="hidden" role="dialog" aria-modal="true" aria-hidden="true">
    <button id="modal-close" class="icon-btn modal-close" title="Close" aria-label="Close">
      <svg viewBox="0 0 16 16" width="12" height="12"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <div id="modal-content">
      <h1 id="modal-title"></h1>
      <section class="properties">
        <div class="properties-head">Properties</div>
        <table id="modal-properties"></table>
      </section>
      <article id="modal-body"></article>
      <section class="subgraph-pane">
        <div class="subgraph-head" id="modal-subgraph-head"></div>
        <div id="modal-subgraph"></div>
      </section>
    </div>
  </div>

  <script src="static/vendor/d3.min.js"></script>
  <script src="static/vendor/fuse.min.js"></script>
  <script src="static/theme.js"></script>
  <script src="static/sidebar.js"></script>
  <script src="static/subgraph.js"></script>
  <script src="static/modal.js"></script>
  <script src="static/graph.js"></script>
  <script src="static/main.js"></script>
</body>
</html>
