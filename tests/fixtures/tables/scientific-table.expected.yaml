fixture: scientific-table.pdf
kind: pdf
description: Adversarial PDF — subscript/superscript chemistry, Greek letters, citation markers.
# Relaxed assertions — measure what survives pypdf's font/glyph mapping rather than asserting perfect fidelity.
must_contain:
  - "Na"
  - "Mg"
  - "tubulin"
  - "actin"
precision_check:
  min_word_count: 15
  min_pipe_rows: 0   # baseline produces no rows; backends with TableFormer or similar should produce >=2
